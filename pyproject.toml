[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "smartgrid-rl-v1"
version = "1.0.0"
description = "Professional OpenEnv energy balancing environment."
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "shivamverma27799" }]
dependencies = [
    "fastapi",
    "uvicorn",
    "numpy",
    "pydantic",
    "openai",
    "pyyaml",
    "openenv>=0.2.0"
]

[project.scripts]
server = "app:app"

[tool.setuptools.package-data]
"*" = ["*.yaml", "*.toml"]
