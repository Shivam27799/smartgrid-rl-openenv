name: "SmartGrid-v1"
version: "1.0.0"
type: "environment"
description: "Real-world microgrid load balancing task simulating energy market optimization."
maintainer: "shivamverma27799"
tasks:
  - id: "easy"
    grader: "tasks.py:grader_easy"
  - id: "medium"
    grader: "tasks.py:grader_medium"
  - id: "hard"
    grader: "tasks.py:grader_hard"
tags: ["openenv", "energy", "resource-allocation"]
observation_space:
  type: "dict"
  properties:
    load: {type: "number", min: 0, max: 1}
    supply: {type: "number", min: 0, max: 1}
    price: {type: "number", min: 0, max: 1}
action_space:
  type: "dict"
  properties:
    energy_trade: {type: "number", min: -1, max: 1}