name: "SmartGrid-v1"
version: "1.0.0"
type: "environment"
description: "Real-world microgrid load balancing task"
maintainer: "shivamverma27799"

tasks:
  - id: "easy"
    name: "Easy Task"
    description: "Basic load balancing task for the easy difficulty setting."
    difficulty: "easy"
    env: "environment:SmartGridEnv"   
    grader: "tasks:grader_easy"
    enabled: true
    
  - id: "medium"
    name: "Medium Task"
    description: "Moderate load balancing task with market price constraints."
    difficulty: "medium"
    env: "environment:SmartGridEnv"   
    grader: "tasks:grader_medium"
    enabled: true
    
  - id: "hard"
    name: "Hard Task"
    description: "Complex load balancing task with high volatility."
    difficulty: "hard"
    env: "environment:SmartGridEnv"   
    grader: "tasks:grader_hard"
    enabled: true

entrypoint: "server.app:main"
