name: "SmartGrid-v1"
version: "1.0.0"
type: "environment"
description: "Real-world microgrid load balancing task"
maintainer: "shivamverma27799"

# Add this section for grader discovery
grader_module: "tasks"

tasks:
  - id: "easy"
    name: "Easy Task"
    description: "Easy difficulty - basic load balancing"
    grader: "grader_easy"
    enabled: true
    
  - id: "medium"
    name: "Medium Task"
    description: "Medium difficulty - moderate load balancing with constraints"
    grader: "grader_medium"
    enabled: true
    
  - id: "hard"
    name: "Hard Task"
    description: "Hard difficulty - complex load balancing scenarios"
    grader: "grader_hard"
    enabled: true

entrypoint: "server.app:main"
